<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ object.play.title }}</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e3c72;
            color: white;
            padding: 40px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #ffd700;
            font-size: 2.5rem;
        }
        .info {
            margin: 20px 0;
            font-size: 1.2rem;
        }
        a {
            color: #1e90ff;
            text-decoration: none;
            margin-top: 20px;
            display: inline-block;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ object.play.title }}</h1>
        <div class="info">
            Начало: {{ object.starts_at|date:"d E Y, H:i" }}
        </div>
        <div class="info">
            Актёры:
            {% for actor in object.actors.all %}
                {{ actor.name }}{% if not for.last %}, {% endif %}
            {% empty %}
                Не указаны
            {% endfor %}
        </div>
        <p><a href="/">← На главную</a></p>
    </div>
</body>
</html>
